<form [formGroup]="createTaskForm" class="container">
  <div class="container__form">
    <div class="container__form__header">Add a new task</div>
    <mat-form-field class="container__form-control--long">
      <mat-label>Task name</mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>
    <app-form-validation
      [control]="createTaskForm.get('name')!"
    ></app-form-validation>

    <div class="container__form-control--short--gap">
      <mat-form-field
        class="container__form-control--short container__form__status"
      >
        <mat-label>Status</mat-label>
        <mat-select formControlName="status">
          @for (status of statuses; track status) {
            <mat-option [value]="status">{{ status }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <div class="container__form-control--short">
        <mat-form-field>
          <mat-label>Progress</mat-label>
          <input type="number" matInput formControlName="progress" />
        </mat-form-field>
        <app-form-validation
          [control]="createTaskForm.get('progress')!"
        ></app-form-validation>
      </div>
    </div>

    <mat-form-field class="container__form-control--long">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description"></textarea>
    </mat-form-field>
    <app-form-validation
      [control]="createTaskForm.get('description')!"
    ></app-form-validation>

    <div class="container__form__buttons">
      <button
        mat-stroked-button
        disabled
        type="submit"
        class="container__form--send"
        [disabled]="!createTaskForm.valid"
        [ngClass]="{
          'container__form--send--enabled': createTaskForm.valid === true,
        }"
        (click)="onSubmit()"
      >
        Submit
      </button>
      <button
        mat-flat-button
        class="container__form--cancel"
        (click)="closeDialog()"
      >
        Cancel
      </button>
    </div>
  </div>
</form>
